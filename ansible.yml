---
- name: Setup for pycapi
  hosts: vps
  become: yes

  tasks:
    # 1. System Prep
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install base dependencies
      apt:
        name:
          - curl
          - git
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - python3-pip
        state: present

    # 2. Docker Installation
    - name: Download and run Docker install script
      shell: |
        curl -fsSL https://get.docker.com -o get-docker.sh
        sh get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Start and enable Docker
      systemctl:
        name: docker
        state: started
        enabled: yes

    # 3. K3s Installation
    - name: Install K3s (Lightweight Kubernetes)
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s node to be ready
      command: kubectl wait --for=condition=Ready node --all --timeout=60s

    # 4. ArgoCD Installation
    - name: Create namespace for ArgoCD
      command: kubectl create namespace argocd
      register: ns_result
      failed_when: false

    - name: Apply ArgoCD Manifests
      command: kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

    - name: Wait for ArgoCD pods to be available
      command: kubectl wait --for=condition=available --timeout=300s deployment/argocd-server -n argocd

    - name: Patch ArgoCD service to NodePort for browser access
      command: kubectl patch svc argocd-server -n argocd -p '{"spec": {"type": "NodePort"}}'

    # 5. Output Credentials
    - name: Retrieve ArgoCD admin password
      shell: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
      register: argo_password

    - name: Get ArgoCD NodePort
      shell: kubectl get svc argocd-server -n argocd -o jsonpath='{.spec.ports[?(@.name=="https")].nodePort}'
      register: argo_port

    - name: Final Success Message
      debug:
        msg: 
          - "SUCCESS! Everything is installed."
          - "URL: https://{{ ansible_host }}:{{ argo_port.stdout }}"
          - "User: admin"
          - "Password: {{ argo_password.stdout }}"
